name: CI

on:
  push:
    branches: [main, 'kks/**']
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          GOOGLE_GEMINI_API_KEY: test-key-for-ci
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test-key-for-ci

      - name: Build
        run: npm run build
        env:
          GOOGLE_GEMINI_API_KEY: test-key-for-ci
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci
          CLERK_SECRET_KEY: sk_test_ci
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test-key-for-ci
